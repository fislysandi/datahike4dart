name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  analyze-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        sdk: [stable]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ matrix.sdk }}

      - name: Install dependencies
        run: dart pub get

      - name: Verify formatting
        run: dart format --set-exit-if-changed lib test example tool example_flutter

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Fetch native library
        run: dart tool/fetch_datahike_native.dart

      - name: Run tests
        run: dart test --exclude-tags=isolate

      - name: Publish dry-run
        run: dart pub publish --dry-run
